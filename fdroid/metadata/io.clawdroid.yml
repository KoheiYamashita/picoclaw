Builds:
  - versionName: 0.4.1
    versionCode: 5
    commit: 8012ffdc8b6bf4e6ba96a1ace34983e6ed9ecebd
    subdir: android/app
    sudo:
      - apt-get update
      - apt-get install -y golang-go make
    gradle:
      - embedded
    srclibs:
      - go@go1.25.6
    build:
      - pushd $$go$$/src
      - ./make.bash
      - popd
      - export GOPATH=$$go$$
      - export PATH="$GOPATH/bin:$PATH"
      - cd ../..
      - make build-android
    ndk: r27c

